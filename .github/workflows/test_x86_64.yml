name: Test (x86_64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rpm_version: ["6.0", "4.20", "4.19"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Build test RPM (rpm ${{ matrix.rpm_version }})
        run: bazel build //tests/rpm:hello-rpm --repo_env=rpmbuild_version=${{ matrix.rpm_version }}
