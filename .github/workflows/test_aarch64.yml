name: Test (aarch64)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04-arm

    container:
      image: fedora:latest

    strategy:
      matrix:
        rpm_version: ["6.0", "4.20", "4.19"]

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rpm \
            git \
            gh

      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Build and validate RPM (rpm ${{ matrix.rpm_version }})
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./bazel test //tests/... --repo_env=rpmbuild_version=${{ matrix.rpm_version }}
